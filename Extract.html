<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cells Split Animation</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .wrap {
      width: min(92vw, 1400px);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    #Layer_1,
    #Layer_2 {
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: 1.6s;
      animation-timing-function: ease-out;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
      will-change: transform;
    }

    #Layer_1 { animation-name: splitTop; }
    #Layer_2 { animation-name: splitBottom; }

    @keyframes splitTop {
      from { transform: translate(0px, 0px); }
      to   { transform: translate(-6px, 8px); }
    }

    @keyframes splitBottom {
      from { transform: translate(0px, 0px); }
      to   { transform: translate(6px, -8px); }
    }

    /* Smooth colour transition after split */
    .recolour path {
      transition: fill 0.45s ease-in-out;
    }
  </style>
</head>

    //  coloured independently. This lookup mirrors that exactly.
    //
    //  Key: "layer|cx|row"
    //    layer = "1" (Layer_1, top-left half) or "2" (Layer_2, bottom-right half)

    //    row   = animation row 1–5

    //  Rows 1, 3, 5 (4-cell rows): both halves → same colour
    //    col 0 (cx 792/1078) → RED    #D14C51 / #EBC8CA

    //    col 2 (cx 1080)     → PURPLE #2510CA / #D5D2FF
    //    col 3 (cx 1224)     → GREEN  #00763E / #D9FFD2

    //    cx 864:  Layer_1 → YELLOW,  Layer_2 → RED
    //    cx 1008: Layer_1 → GREY,    Layer_2 → GREY

        document.getElementById('Layer_' + layerNum)
          .querySelectorAll('path')
          .forEach(path => {
            const key = `${layerNum}|${path.dataset.cx}|${path.dataset.row}`;
            const col = COLOURS[key];
            if (!col) return;
            path.style.fill = path.classList.contains('st1') ? col[0] : col[1];
          });
