<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News — Brilliant Dyes</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #000EAA;
      --orange: #F58C60;
      --cream: #FFFDEC;
      --dark: #2D2D2A;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--cream);
      color: var(--dark);
      line-height: 1.6;
    }

    a { text-decoration: none; }
    h1, h2, h3, h4, h5, h6 { font-weight: 400; }

    .btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 50px;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.15s ease;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-orange { background: var(--orange); color: white; }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      height: 72px;
      border-bottom: 1px solid rgba(0, 14, 170, 0.08);
    }

    .nav-logo img { height: 44px; width: auto; display: block; }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      color: var(--blue);
      font-size: 15px;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .nav-links a:hover { opacity: 0.65; }
    .nav-links a.active {
      text-decoration: underline;
      text-underline-offset: 4px;
      text-decoration-thickness: 1.5px;
      text-decoration-color: rgba(0, 14, 170, 0.45);
    }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 72px 60px 56px;
      border-bottom: 1px solid rgba(0, 14, 170, 0.08);
    }

    .page-header-label {
      display: inline-block;
      background: var(--orange);
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 20px;
    }

    .page-header h1 {
      font-size: 52px;
      color: var(--dark);
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    /* ── NEWS GRID ── */
    .news-grid-section {
      padding: 60px 60px 100px;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }

    .news-item {
      display: block;
      text-decoration: none;
      border-radius: 16px;
      overflow: hidden;
      background: white;
      box-shadow: 0 2px 12px rgba(45, 45, 42, 0.07),
                  0 1px 3px rgba(45, 45, 42, 0.05);
      transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.22s ease;
    }
    .news-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 28px rgba(45, 45, 42, 0.12),
                  0 2px 6px rgba(45, 45, 42, 0.06);
    }
    .news-item:active { transform: translateY(-1px); }

    .news-item-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .news-item-body {
      padding: 20px 22px 24px;
    }

    .news-item-date {
      font-size: 11px;
      font-weight: 600;
      color: var(--orange);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .news-item-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--dark);
      line-height: 1.45;
    }

    .news-item-arrow {
      display: inline-block;
      margin-top: 14px;
      font-size: 13px;
      color: var(--orange);
      font-weight: 500;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="nav-logo">
      <a href="index.html"><img src="brand_assets/Logo.svg" alt="brilliant dyes"></a>
    </div>
    <ul class="nav-links">
      <li><a href="samples.html">samples</a></li>
      <li><a href="science.html">science</a></li>
      <li><a href="index.html#team">team</a></li>
      <li><a href="news.html" class="active">news</a></li>
      <li><a href="index.html#contact" class="btn btn-orange">Collaborate</a></li>
    </ul>
  </nav>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <div class="page-header-label">all news</div>
    <h1>News &amp;<br>Updates</h1>
  </div>

  <!-- NEWS GRID -->
  <div class="news-grid-section">
    <div class="news-grid" id="news-grid"></div>
  </div>

  <script src="news-data.js"></script>
  <script>
    const grid = document.getElementById('news-grid');
    NEWS_ITEMS.forEach(item => {
      const imgStyle = item.imgStyle ? ` style="${item.imgStyle}"` : '';
      grid.insertAdjacentHTML('beforeend', `
        <a href="${item.url}" class="news-item" target="_blank" rel="noopener">
          <img src="${item.img}" alt="${item.title}" class="news-item-img"${imgStyle}>
          <div class="news-item-body">
            <div class="news-item-date">${item.date}</div>
            <div class="news-item-title">${item.title}</div>
            <span class="news-item-arrow">Read more →</span>
          </div>
        </a>
      `);
    });
  </script>

</body>
</html>
