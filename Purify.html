  <button id="playBtn" onclick="startAnimation()">▶ Play</button>
  <button onclick="resetAnimation()">↺ Reset</button>

</div>

<script>
  // ─── Timing config ────────────────────────────────────────────────────
  const PHASE1_DURATION = 1400; // pos1 → pos2  (spread apart)
  const PHASE1_EASE_DELAY = 200; // slight stagger
  const PHASE2_DURATION = 1200; // pos2 → pos3  (grey fades)
  const PAUSE_BETWEEN = 600;   // pause between phases

  // ─── Translation targets ──────────────────────────────────────────────
  // Phase 1: all groups translate to their Pos2 x-positions
  // Yellow: +57px (Pos1 centre ~125 → Pos2 centre ~182)
  // Grey: +81px
  // Blue: +98px
  // Green: +166px
  // Red: 0

  const phaseLabel = document.getElementById('phaseLabel');
  let animating = false;

  window.addEventListener('load', () => setTimeout(startAnimation, 200));

  function easeInOut(t) {
    return t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }

  function setGroupTransform(selector, tx, opacity) {
    const g = document.querySelector(selector);
    if (!g) return;
    g.style.transform = `translateX(${tx}px)`;
    if (opacity !== undefined) g.style.opacity = opacity;
  }

  function animate(fromTx, toTx, duration, updateFn, doneFn) {
    const start = performance.now();
    function frame(now) {
      const raw = Math.min((now - start) / duration, 1);
      const t = easeInOut(raw);
      updateFn(t);
      if (raw < 1) requestAnimationFrame(frame);
      else { updateFn(1); if (doneFn) doneFn(); }
    }
    requestAnimationFrame(frame);
  }

  function resetAnimation() {
    animating = false;
    ['yellow-group','grey-group','blue-group','green-group'].forEach(cls => {
      const g = document.querySelector('.' + cls);
      if (g) { g.style.transform = 'translateX(0px)'; g.style.opacity = '1'; }
    });
    phaseLabel.textContent = 'Position 1 — Start';
    document.getElementById('playBtn').disabled = false;
  }

  function startAnimation() {
    if (animating) return;
    animating = true;
    document.getElementById('playBtn').disabled = true;
    phaseLabel.textContent = 'Phase 1 — Spreading apart…';

    // Phase 1: translate to Pos2
    animate(0, 1, PHASE1_DURATION, t => {
      setGroupTransform('.yellow-group', lerp(0,  57, t));
      setGroupTransform('.grey-group',   lerp(0,  81, t));
      setGroupTransform('.blue-group',   lerp(0,  98, t));
      setGroupTransform('.green-group',  lerp(0, 166, t));
    }, () => {
      phaseLabel.textContent = 'Position 2 — Groups spread';
      setTimeout(() => {
        phaseLabel.textContent = 'Phase 2 — Grey fading out…';
        // Phase 2: grey fades out; others stay (Pos3 ≈ Pos2 for non-grey)
        animate(0, 1, PHASE2_DURATION, t => {
          const g = document.querySelector('.grey-group');
          if (g) g.style.opacity = 1 - t;
          // slight additional shift for yellow/blue/green into Pos3
          setGroupTransform('.yellow-group', lerp(57, 64, t));
          setGroupTransform('.blue-group',   lerp(98, 95, t));
        }, () => {
          phaseLabel.textContent = 'Position 3 — Final state';
          animating = false;
        });
      }, PAUSE_BETWEEN);
    });
  }
</script>

</body>
