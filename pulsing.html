<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulsing Halo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
    }

    svg {
      width: 240px;
      height: 240px;
      overflow: visible;
    }

    .halo {
      transform-box: fill-box;
      transform-origin: center;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.9;
      }
      50% {
        transform: scale(1.12);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

  <svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
    <g class="halo" filter="url(#filter0_f_1604_4250)">
      <circle cx="120" cy="120" r="70" fill="#FFAF8E"/>
    </g>

    <circle cx="119.5" cy="119.5" r="19.5" fill="#F58C60"/>

    <defs>
      <filter id="filter0_f_1604_4250" x="0" y="0" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
        <feFlood flood-opacity="0" result="BackgroundImageFix"/>
        <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
        <feGaussianBlur stdDeviation="25" result="effect1_foregroundBlur_1604_4250"/>
      </filter>
    </defs>
  </svg>

</body>
</html>
