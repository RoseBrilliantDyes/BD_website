<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enzyme + Cell Textile Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #FFFDEC;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: sans-serif;
  }

  .scene {
    position: relative;
    width: 500px;
    height: 400px;
    flex-shrink: 0;
  }

  /* ── Textile wrapper ── */
  #textile-wrap {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 460px;
  }
  #textile-wrap svg { width: 100%; display: block; }
  #textile-orig { position: relative; }
  #textile-blue { position: absolute; top: 0; left: 0; width: 100%; opacity: 0; transition: opacity 0.9s ease; }

  /* ── Floating pair container ── */
  #pair {
    position: absolute;
    bottom: 210px;
    left: 50%;
    transform: translateX(-50%);
    /* wide enough to hold both elements separated during float */
    width: 120px;
    height: 80px;
  }

  /*
    Bonded SVG analysis (viewBox 0 0 25 50):
    - Enzyme C-shape occupies the full viewBox, opens to the RIGHT
      (flat/open edge is on the right at x≈24.7)
    - Cell C-shape is positioned inside the enzyme's opening:
        cell rect: x=17.5..24.4, y=13.8..32.8
        cell arc: opens to the left, with flat edge at x≈24.4 on the right
    Both are rendered within the same 25×50 viewBox, overlaid.

    So the bonded state = one combined SVG where cell sits INSIDE enzyme.
    During float: enzyme on left side of pair, cell on right side (separated).
    On bind: cell moves LEFT into enzyme's opening — they overlap/dock.
  */

  /* Enzyme: rendered at ~56px wide × ~112px tall (2× the 25:50 ratio) */
  #enzyme {
    position: absolute;
    width: 56px;
    height: 112px;
    top: -16px; /* center vertically in pair */
  }

  /* Cell: rendered at ~30px wide × ~68px tall (scaled to match enzyme proportionally) */
  #cell {
    position: absolute;
    width: 30px;
    height: 68px;
    top: 6px;
  }

  /* pulse ring */
  #pulse {
    position: absolute;
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: 2px solid #2510CA;
    opacity: 0;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) scale(0.2);
    pointer-events: none;
    z-index: 10;
  }
  #pulse.active { animation: pulseRing 0.7s ease-out forwards; }
  @keyframes pulseRing {
    0%   { opacity: 0.8; transform: translate(-50%,-50%) scale(0.2); }
    100% { opacity: 0;   transform: translate(-50%,-50%) scale(2.5); }
  }

  #label {
    display: none;
  }

  #replay {
    display: none;
    position: absolute;
    bottom: -52px;
    left: 50%;
    transform: translateX(-50%);
    background: #2510CA;
    color: white;
    border: none;
    padding: 9px 28px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13px;
    letter-spacing: 0.05em;
  }
  #replay:hover { background: #3a24e0; }

  /*
    Float keyframes.
    Enzyme floats on the left side of the pair.
    Cell floats on the right side, separated.
    Each has independent organic drift.
  */
  @keyframes enzymeFloat {
    0%   { transform: translate(0px,   0px)  rotate(0deg);  }
    20%  { transform: translate(4px,  -8px)  rotate(4deg);  }
    50%  { transform: translate(-3px, -12px) rotate(-3deg); }
    75%  { transform: translate(5px,  -6px)  rotate(3deg);  }
    100% { transform: translate(0px,   0px)  rotate(0deg);  }
  }
  @keyframes cellFloat {
    0%   { transform: translate(0px,   0px)  rotate(0deg);  }
    30%  { transform: translate(-5px, -10px) rotate(-5deg); }
    60%  { transform: translate(4px,  -14px) rotate(5deg);  }
    100% { transform: translate(0px,   0px)  rotate(0deg);  }
  }
</style>
</head>

  <!-- ── Floating pair container ── -->
  <div id="pair">
    <div id="pulse"></div>

    <!--
      The bonded SVG uses a single 25×50 viewBox where BOTH shapes coexist.
      The enzyme C opens to the RIGHT (flat edge at x~24.7 on the right side).
      The cell C also has its flat edge at x~24.4 on the right, and sits
      INSIDE the enzyme's opening — they are overlaid, not side-by-side.

      Strategy:
      • Use ONE shared SVG container (viewBox="0 0 25 50") for both elements,
        rendered at 60px wide × 120px tall.
      • During float: the cell is offset RIGHT (coming from outside the opening).
        We translate #cell-g by +20px so it starts to the right, outside the enzyme.
      • On bind: translate #cell-g back to 0 so it slots into the enzyme's opening.
    -->
    <svg id="bonded-svg" viewBox="-14 0 39 50" width="78" height="100"
         style="position:absolute; top:-10px; left:11px; overflow:visible;">

      <!-- Enzyme C-shape (stays put) -->
      <g id="enzyme-g">
        <mask id="e-mask" fill="white">

<script>
  const enzymeG = document.getElementById('enzyme-g');
  const cellG   = document.getElementById('cell-g');
  const bondSvg = document.getElementById('bonded-svg');
  const pair    = document.getElementById('pair');
  const pulse   = document.getElementById('pulse');
  const origTex = document.getElementById('textile-orig');
  const blueTex = document.getElementById('textile-blue');
  const replay  = document.getElementById('replay');
  const label   = document.getElementById('label');

  // We animate the whole pair container for organic floating,
  // but independently animate the cell's offset within SVG space.
  // Float: cellG translateX(+18px) — cell is outside/right of enzyme opening
  // Bind:  cellG translateX(0)     — cell slots into enzyme opening

  let floatAnimE, floatAnimC;

  function runAnimation() {
    // ── Reset ──
    pair.style.cssText = `
      position: absolute;
      bottom: 210px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 80px;
    `;
    bondSvg.style.opacity = '1';
    bondSvg.style.transform = '';

    // Reset cell to separated position
    cellG.style.transition = '';
    cellG.style.transform  = 'translateX(18px)';

    // Reset enzyme
    enzymeG.style.animation = '';
    enzymeG.style.transform = '';

    // Reset textile
    origTex.style.transition = '';
    origTex.style.opacity    = '1';
    blueTex.style.opacity    = '0';

    pulse.className   = '';
    replay.style.display = 'none';
    label.style.opacity  = '1';
    label.textContent    = 'PHASE 1 — FLOATING';

    // ── Phase 1: floating (whole SVG bobs organically) ──
    setTimeout(() => {
      bondSvg.style.animation = 'svgFloat 3s ease-in-out infinite';
      cellG.style.animation   = 'cellSeparateFloat 2.3s ease-in-out infinite';
    }, 60);

    // ── Phase 2: bind (3.2s) ──
    setTimeout(() => {
      label.textContent = 'PHASE 2 — BINDING';

      // Stop floating
      const computed = window.getComputedStyle(bondSvg).transform;
      bondSvg.style.animation = 'none';
      bondSvg.style.transform = computed; // freeze in place
      cellG.style.animation   = 'none';

      // Slide cell into enzyme opening
      cellG.style.transition = 'transform 0.85s cubic-bezier(0.4, 0, 0.2, 1)';
      cellG.style.transform  = 'translateX(0px)';

      // Pulse ring
      setTimeout(() => { pulse.className = 'active'; }, 820);

    }, 3200);

    // ── Phase 3: textile turns blue (4.4s) ──
    setTimeout(() => {
      label.textContent = 'PHASE 3 — DYEING';
      origTex.style.transition = 'opacity 0.9s ease';
      origTex.style.opacity    = '0';
      blueTex.style.transition = 'opacity 0.9s ease';
      blueTex.style.opacity    = '1';
    }, 4400);

    // ── Phase 4: pair vanishes (6s) ──
    setTimeout(() => {
      label.textContent = 'PHASE 4 — DONE';
      bondSvg.style.transition = 'opacity 0.65s ease, transform 0.65s ease';
      bondSvg.style.opacity    = '0';
      bondSvg.style.transform  = 'scale(0.2)';
    }, 6000);

    // ── Replay ──
    setTimeout(() => {
      label.style.opacity  = '0';
      replay.style.display = 'block';
    }, 7000);
  }

  replay.addEventListener('click', runAnimation);
  runAnimation();

  // Scale scene to fit iframe viewport
  function fitScene() {
    const scene = document.querySelector('.scene');
    const scale = Math.min(window.innerWidth / 500, window.innerHeight / 400) * 0.9;
    scene.style.transform = 'scale(' + scale + ')';
    scene.style.transformOrigin = 'center center';
  }
  window.addEventListener('load', fitScene);
  window.addEventListener('resize', fitScene);
  fitScene();
</script>

<style>
  /* Whole-SVG gentle bob — enzyme and cell float together as a unit but cell also has own offset */
  @keyframes svgFloat {
    0%   { transform: translate(0px,   0px)  rotate(0deg);  }
    22%  { transform: translate(4px,  -8px)  rotate(3deg);  }
    55%  { transform: translate(-3px, -12px) rotate(-2deg); }
    78%  { transform: translate(5px,  -6px)  rotate(2.5deg);}
    100% { transform: translate(0px,   0px)  rotate(0deg);  }
  }

  /* Cell extra independent wobble while separated */
  @keyframes cellSeparateFloat {
    0%   { transform: translateX(18px) rotate(0deg);  }
    28%  { transform: translateX(20px) rotate(-5deg); }
    60%  { transform: translateX(16px) rotate(4deg);  }
    100% { transform: translateX(18px) rotate(0deg);  }
  }
</style>
