<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cells Split Animation</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
    }

    .wrap {
      width: min(92vw, 1400px);
    }

    svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    #Layer_1,
    #Layer_2 {
      transform-box: fill-box;
      transform-origin: center;
      animation-duration: 1.6s;
      animation-timing-function: ease-out;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
      will-change: transform;
    }

    /* top half of every cell */
    #Layer_1 {
      animation-name: splitTop;
    }

    /* bottom half of every cell */
    #Layer_2 {
      animation-name: splitBottom;
    }

    @keyframes splitTop {
      from {
        transform: translate(0px, 0px);
      }
      to {
        transform: translate(-6px, 8px);
      }
    }

    @keyframes splitBottom {
      from {
        transform: translate(0px, 0px);
      }
      to {
        transform: translate(6px, -8px);
      }
    }
  </style>
</head>
