<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animated Drops</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    svg {
      width: min(90vw, 900px);
      height: auto;
      display: block;
    }

    .drop {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      animation: appear 0.55s ease-out forwards;
    }

    @keyframes appear {
      0% {
        opacity: 0;
        transform: scale(0.75);
      }
      70% {
        opacity: 1;
        transform: scale(1.06);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .d1  { animation-delay: 0s; }
    .d2  { animation-delay: 0.34s; }
    .d3  { animation-delay: 0.52s; }
    .d4  { animation-delay: 0.68s; }
    .d5  { animation-delay: 0.92s; }
    .d6  { animation-delay: 1.04s; }
    .d7  { animation-delay: 1.16s; }
    .d8  { animation-delay: 1.28s; }
    .d9  { animation-delay: 1.40s; }
    .d10 { animation-delay: 1.58s; }
    .d11 { animation-delay: 1.68s; }
    .d12 { animation-delay: 1.78s; }
    .d13 { animation-delay: 1.88s; }
    .d14 { animation-delay: 1.98s; }
    .d15 { animation-delay: 2.08s; }
    .d16 { animation-delay: 2.18s; }
    .d17 { animation-delay: 2.32s; }
    .d18 { animation-delay: 2.46s; }
    .d19 { animation-delay: 2.56s; }
    .d20 { animation-delay: 2.64s; }
  </style>
</head>
